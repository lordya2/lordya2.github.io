name: Temporary Pages deployment refresh

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event.issue.number == 30 &&
      github.event.comment.user.login == 'lordya2' &&
      github.event.comment.body == '/deploy-pages-refresh'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current master
        uses: actions/checkout@v6
        with:
          ref: master
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    if: >-
      github.event.issue.number == 30 &&
      github.event.comment.user.login == 'lordya2' &&
      github.event.comment.body == '/deploy-pages-refresh'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
