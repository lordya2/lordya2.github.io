name: Replace staged CV PDF

on:
  push:
    paths:
      - '_cv_upload/READY'

permissions:
  contents: write

jobs:
  replace-cv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode and verify staged CV
        shell: bash
        run: |
          cat _cv_upload/part-* | base64 --decode > assets/CV.pdf
          echo "e83d5b91751a203cba3415baeaa24398489ea5df23725be022ba83b8cba9fa6a  assets/CV.pdf" | sha256sum --check -
      - name: Commit CV
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/CV.pdf
          git diff --cached --quiet || git commit -m "Replace CV PDF"
          git push
