principles:
  - '현장 의사결정에서 출발하는 문제 정의'
  - '데이터 기반 분석과 연구 설계의 엄밀성'
  - '기업 데이터와 민감 정보에 대한 비밀유지'
  - '실행 가능한 실무적 함의 도출'
  - '학생 학습과 기업 가치 창출의 균형'
contact_cta:
  text: '산학협력 가능성을 논의하고 싶으시면 해결하고 싶은 운영·경영 질문, 활용 가능한 데이터의 범위, 희망 일정 등을 간단히 적어 이메일로 연락해 주세요.'
  subject: '산학협력 문의'
  button: '산학협력 문의하기'
