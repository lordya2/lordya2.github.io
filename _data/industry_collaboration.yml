contact_cta:
  text: '관심 주제, 참석 대상, 희망 일정, 활용 가능한 데이터의 범위를 알려주시면 강연, 자문·공동연구, 산학 프로젝트 중 적합한 방식을 검토하겠습니다. 문의 단계에서는 연락에 필요한 본인의 성명·업무용 이메일·전화번호 외에, 제3자의 개인정보, 영업비밀, 민감정보 또는 원자료를 입력하거나 첨부하지 마십시오.'
  subject: '기업 강연·자문·산학협력 문의'
  button: '기업 강연·협업 문의하기'
