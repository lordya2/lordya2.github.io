headline: '산학협력'
eyebrow_en: 'Industry Collaboration'
title: '기업 데이터와 운영 의사결정을 연결하는 연구 기반 산학협력'
intro: >-
  기업이 보유한 운영 데이터와 현장의 의사결정 문제를 바탕으로, 리테일, 서비스, 플랫폼, 공급망, 헬스케어 영역의 실질적 개선 기회를 함께 찾습니다. 단순한 분석 보고서보다 “어떤 의사결정을 바꿀 것인가”를 먼저 정의하고, 데이터 분석·현장실험·인과추론·머신러닝을 결합해 실행 가능한 인사이트를 도출하는 것을 목표로 합니다.
engagement_intro: >-
  운영 문제와 활용 가능한 데이터의 범위에 따라 강연·워크숍, 자문·공동연구, 산학 프로젝트 형태로 협력합니다.
collaboration_areas:
  - title: '데이터 기반 운영진단'
    description: '판매, 재고, 고객, 물류, 노동, 서비스 데이터를 활용해 병목, 낭비, 수요-공급 불일치, 고객 이탈, 운영 리스크를 진단합니다.'
  - title: 'A/B 테스트 및 현장실험 설계'
    description: '프로모션, 추천 알고리즘, 서비스 정책, 매장 운영 방식, 고객 커뮤니케이션의 효과를 현장실험 또는 준실험 설계로 평가합니다.'
  - title: '인과추론 기반 효과 평가'
    description: '이중차분, 매칭, 도구변수, 이벤트 스터디 등 인과추론 방법을 활용해 정책·제도·운영 변화가 성과에 미친 영향을 추정합니다.'
  - title: '수요예측·추천·재고 의사결정'
    description: '머신러닝과 운영관리 관점을 결합해 판매량 예측, 추천 서비스, 상품 배분, 재고 운영, 수요-공급 매칭 문제를 다룹니다.'
  - title: '리테일·서비스·플랫폼 운영 분석'
    description: '온·오프라인 채널, 멤버십, 플랫폼 풀필먼트, 고객 여정, 매장 운영, 서비스 자동화와 관련된 의사결정을 분석합니다.'
  - title: '공급망 회복탄력성과 리스크 진단'
    description: '공급중단, 재고 부족, 공급망 구조 변화, 운영 투명성, 회복 경험 학습이 성과에 미치는 영향을 데이터로 평가합니다.'
project_modes:
  - id: 'executive-workshops'
    title: '기업 강연·임원 워크숍'
    description: '운영관리, 공급망 회복탄력성, AI 기반 업무설계, 인과추론을 최신 연구와 기업 사례를 바탕으로 임원·실무자의 의사결정 언어로 풀어냅니다.'
    cta: '강연·워크숍 문의'
    event: 'corporate_speaking_click'
  - id: 'advisory-research'
    title: '자문·공동연구'
    description: '기업의 운영 질문을 명확히 정의하고 데이터 가용성을 점검한 뒤, 현장실험·준실험·인과추론을 활용한 분석과 효과평가를 함께 설계합니다.'
    cta: '자문·공동연구 논의'
    event: 'advisory_research_click'
  - id: 'industry-projects'
    title: '산학 프로젝트'
    description: '기업 현안을 고려대 MSBA 캡스톤 또는 연구 프로젝트와 연결해 수요예측, 추천, 고객·운영 분석, 효과평가 과제를 수행합니다.'
    cta: '산학 프로젝트 제안'
    event: 'industry_project_click'
capstone_intro: >-
  아래는 공개 가능한 범위에서 소개하는 MSBA 캡스톤 및 산학 프로젝트 사례입니다. 학생 프로젝트의 경우 기업 현안, 데이터 분석, 머신러닝, 인과추론, 추천·예측 모델링을 연결해 실무적으로 활용 가능한 결과물을 만드는 것을 목표로 합니다.
case_disclaimer: >-
  아래 사례는 공개 가능한 범위에서 프로젝트의 질문과 분석 접근을 소개합니다. 기업의 승인 없이 민감한 데이터, 실행 결과 또는 정량적 성과를 공개하지 않습니다.
capstone_projects:
  - partner: 'GS Retail'
    title: '이미지 데이터 군집 분석을 통한 소비자 구매 행동 분석 및 추천 서비스 개선'
    description: '이미지 데이터와 소비자 구매 행동을 연결해 상품 이해와 추천 서비스 개선 가능성을 탐색한 캡스톤 프로젝트입니다.'
    problem: '상품 이미지에서 얻은 정보와 구매 행동을 어떻게 연결해 추천 서비스 개선 가능성을 찾을 수 있는가?'
    data: '상품 이미지 데이터와 소비자 구매 행동 데이터'
    method: '이미지 데이터 군집분석과 구매 행동 연계 분석'
    decision_relevance: '상품 특성 이해와 추천 로직 개선을 위한 분석 근거 탐색'
    video_url: 'https://www.youtube.com/embed/GLikvwQ0ugA'
  - partner: 'E-Land / SPAO'
    title: '국내 SPA 패션 브랜드 SPAO 분배 시스템 재구축: 머신러닝을 이용한 판매량 예측 모델을 활용하여'
    description: '판매량 예측 모델을 활용해 패션 상품 분배와 재고 운영 의사결정을 개선하는 방향을 탐색한 캡스톤 프로젝트입니다.'
    problem: '패션 상품의 판매량을 더 정확히 예측해 분배와 재고 의사결정을 어떻게 지원할 수 있는가?'
    data: '상품 판매 데이터'
    method: '머신러닝 기반 판매량 예측 모델'
    decision_relevance: '상품별 분배와 재고 운영 개선 가능성 검토'
    video_url: 'https://www.youtube.com/embed/UlAuBOKTvHc'
  - partner: 'Hyundai Motor Group'
    title: '블루멤버스 활동이 차량 구매 결정에 미치는 영향: 이중차분 모형과 RFM Cluster에 따른 관계 관리 전략'
    description: '멤버십 활동과 차량 구매 간 관계를 이중차분 모형과 RFM 클러스터링으로 분석한 프로젝트입니다.'
    problem: '블루멤버스 활동은 차량 구매 결정에 어떤 영향을 미치며, 고객군별 관계관리 전략은 어떻게 달라져야 하는가?'
    data: '멤버십 활동과 차량 구매 데이터'
    method: '이중차분 모형과 RFM 군집분석'
    decision_relevance: '멤버십 활동의 효과와 고객군별 관계관리 전략 검토'
  - partner: 'Hyundai Home Shopping'
    title: 'Hmall 추천 알고리즘 구축'
    description: '온라인 쇼핑몰 고객 행동 데이터를 바탕으로 추천 알고리즘과 개인화 의사결정의 개선 가능성을 탐색한 프로젝트입니다.'
    problem: '온라인 고객 행동을 활용해 Hmall 추천을 어떻게 개인화할 수 있는가?'
    data: '온라인 쇼핑몰 고객 행동 데이터'
    method: '고객 행동 기반 추천 알고리즘 구축'
    decision_relevance: '추천 및 개인화 의사결정 개선 가능성 탐색'
selected_collaborators:
  note: '아래 조직은 공개 가능한 범위에서 기존 연구, 프로젝트, 캡스톤, 또는 산학협력과 연결된 사례입니다. 추천사나 보증으로 제시하는 것은 아닙니다.'
