headline: '기업 강연·자문'
eyebrow_en: 'Industry Collaboration'
title: '기업을 위한 공급망 강연·운영관리 자문·공동연구'
intro: >-
  이현석 고려대학교 경영대학 교수는 기업과 기관이 마주한 공급망 리스크와 운영 문제를 최신 연구와 실제 데이터의 언어로 다룹니다. 강연·임원 워크숍에서는 경영진과 실무자가 함께 사용할 수 있는 의사결정 프레임을 제공하고, 운영관리 자문·공동연구와 산학 프로젝트에서는 문제 정의부터 분석과 효과평가까지 함께 설계합니다.
engagement_intro: >-
  운영 문제와 활용 가능한 데이터의 범위에 따라 강연·워크숍, 자문·공동연구, 산학 프로젝트 형태로 협력합니다.
speaking:
  title: '공급망 리스크와 회복탄력성 기업 강연'
  summary: >-
    공급망 중단을 단순히 재고나 공급선의 문제로만 보지 않고, 조직이 위기를 얼마나 빨리 진단하고 복구하며 다음 위기에 대비하는가의 문제로 다룹니다. 의약품 부족과 공급망 회복 연구를 비롯한 실증 연구를 경영진과 실무자가 활용할 수 있는 사례와 질문으로 풀어냅니다.
  topics:
    - '위기를 겪은 조직은 어떻게 다음 회복을 더 빠르게 만드는가'
    - '공급망 회복탄력성을 구성하는 재고, 투명성, 경험과 조직 학습'
    - '의약품 부족 사례로 보는 내부 요인과 외부 요인의 차이'
    - '위기 대응 경험을 기록하고 조직과 사업장 사이에 이전하는 방법'
    - '현장 데이터로 공급망 정책과 운영 변화의 효과를 평가하는 방법'
  audience: >-
    CEO·임원과 본부장, 전략·SCM·구매·생산·물류·리스크관리 조직, 데이터·혁신 실무자 등을 대상으로 조직의 관심 주제와 참석자 구성에 맞춰 강연 또는 워크숍을 설계합니다.
advisory:
  title: '데이터 기반 운영관리 기업 자문·공동연구'
  summary: >-
    운영관리 자문은 분석기법을 먼저 정하기보다 “어떤 의사결정을 바꿀 것인가”를 명확히 하는 데서 시작합니다. 판매, 재고, 고객, 물류, 노동, 서비스 데이터를 활용해 운영 문제를 진단하고, 현장실험·준실험·인과추론·머신러닝을 결합해 개선안과 정책의 효과를 평가합니다.
  questions:
    - '도입한 정책이나 운영 변화가 실제 성과를 개선했는가'
    - '판매·재고·서비스 과정의 병목과 수요·공급 불일치는 어디에서 발생하는가'
    - '수요예측, 추천, 상품 배분과 재고 의사결정을 어떻게 개선할 수 있는가'
    - 'AI와 자동화가 직원, 고객과 운영 성과에 어떤 영향을 미치는가'
    - '작은 규모의 파일럿이나 현장실험을 어떻게 설계하고 평가할 것인가'
  process:
    - '의사결정 질문과 기대 결과물 정의'
    - '활용 가능한 데이터의 범위와 품질 점검'
    - '분석·실험·인과추론 설계'
    - '결과 해석과 실행 가능한 다음 의사결정 도출'
healthcare_pharma:
  title: '헬스케어·제약 공급망 전문 분야'
  summary: >-
    의약품 부족을 공급량과 재고의 문제에 한정하지 않고, 생산공장의 회복 경험, 경험의 다양성, 운영 투명성, 시장 구조와 공장 간 지식 이전의 관점에서 연구합니다. 응급의료 접근성과 이용 정책 등 헬스케어 운영 문제도 대규모 현장 데이터와 인과추론을 활용해 분석합니다.
  research:
    - title: '의약품 부족 회복과 조직 학습'
      description: '과거 부족 사태의 회복 경험이 현재의 회복 속도에 미치는 영향과 학습의 조건을 분석한 2026년 Management Science 연구입니다.'
    - title: '의약품 부족과 운영 투명성'
      description: '생산중단 의무 보고로 높아진 운영 투명성이 의약품 부족을 완화하는 조건을 분석한 2021년 Management Science 연구입니다.'
collaboration_areas:
  - title: '데이터 기반 운영진단'
    description: '판매, 재고, 고객, 물류, 노동, 서비스 데이터를 활용해 병목, 낭비, 수요-공급 불일치, 고객 이탈, 운영 리스크를 진단합니다.'
  - title: 'A/B 테스트 및 현장실험 설계'
    description: '프로모션, 추천 알고리즘, 서비스 정책, 매장 운영 방식, 고객 커뮤니케이션의 효과를 현장실험 또는 준실험 설계로 평가합니다.'
  - title: '인과추론 기반 효과 평가'
    description: '이중차분, 매칭, 도구변수, 이벤트 스터디 등 인과추론 방법을 활용해 정책·제도·운영 변화가 성과에 미친 영향을 추정합니다.'
  - title: '수요예측·추천·재고 의사결정'
    description: '머신러닝과 운영관리 관점을 결합해 판매량 예측, 추천 서비스, 상품 배분, 재고 운영, 수요-공급 매칭 문제를 다룹니다.'
  - title: '리테일·서비스·플랫폼 운영 분석'
    description: '온·오프라인 채널, 멤버십, 플랫폼 풀필먼트, 고객 여정, 매장 운영, 서비스 자동화와 관련된 의사결정을 분석합니다.'
  - title: '공급망 회복탄력성과 리스크 진단'
    description: '공급중단, 재고 부족, 공급망 구조 변화, 운영 투명성, 회복 경험 학습이 성과에 미치는 영향을 데이터로 평가합니다.'
project_modes:
  - id: 'executive-workshops'
    title: '기업 강연·임원 워크숍'
    description: '운영관리, 공급망 회복탄력성, AI 기반 업무설계, 인과추론을 최신 연구와 기업 사례를 바탕으로 임원·실무자의 의사결정 언어로 풀어냅니다.'
    cta: '강연·워크숍 문의'
    event: 'corporate_speaking_click'
  - id: 'advisory-research'
    title: '운영관리 자문·공동연구'
    description: '기업의 운영 질문을 명확히 정의하고 데이터 가용성을 점검한 뒤, 현장실험·준실험·인과추론을 활용한 분석과 효과평가를 함께 설계합니다.'
    cta: '자문·공동연구 논의'
    event: 'advisory_research_click'
  - id: 'industry-projects'
    title: '데이터 기반 산학 프로젝트'
    description: '기업 현안을 고려대 MSBA 캡스톤 또는 연구 프로젝트와 연결해 수요예측, 추천, 고객·운영 분석, 효과평가 과제를 수행합니다.'
    cta: '산학 프로젝트 제안'
    event: 'industry_project_click'
capstone_intro: >-
  아래는 공개 가능한 범위에서 소개하는 MSBA 캡스톤 및 산학 프로젝트 사례입니다. 학생 프로젝트의 경우 기업 현안, 데이터 분석, 머신러닝, 인과추론, 추천·예측 모델링을 연결해 실무적으로 활용 가능한 결과물을 만드는 것을 목표로 합니다.
case_disclaimer: >-
  아래 사례는 공개 가능한 범위에서 프로젝트의 질문과 분석 접근을 소개합니다. 기업의 승인 없이 민감한 데이터, 실행 결과 또는 정량적 성과를 공개하지 않습니다.
