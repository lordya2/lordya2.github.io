    project_title_ko: '공급업체 기반 축소와 회복탄력성'
    project_summary: 'Uses Korean VAT-based firm-to-firm transaction and financial data to examine how persistent pre-COVID supplier-base de-scaling relates to firms’ inventory responses and financial outcomes during the pandemic.'
    project_summary_ko: '국내 부가가치세 기반 기업 간 거래 및 재무자료를 활용해 코로나19 이전 공급업체 기반 축소(supply-base de-scaling)가 팬데믹 기간 재고 대응 및 재무성과와 어떤 관계가 있는지 분석합니다.'
