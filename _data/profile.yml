positioning: 'I use operational data, field experiments, and causal inference to understand what works—and to identify actionable improvements in healthcare and pharmaceutical supply chains, retail and services, platforms, and AI-enabled work.'
positioning_ko: '기업과 기관의 실제 데이터를 바탕으로 공급망 중단과 회복, 의약품 부족, 리테일·서비스 운영, 플랫폼 및 AI 기반 업무가 성과에 미치는 영향을 연구합니다. 현장실험과 인과추론을 통해 무엇이 실제로 효과가 있는지 검증하고, 더 나은 운영 의사결정으로 연결합니다.'
