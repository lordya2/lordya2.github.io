- id: 'group-incentives'
  category: 'peer_reviewed'
  short_title: 'Group Incentives for Store Managers'
  featured_short_title: 'Group Incentives'
  featured_short_title_ko: '리테일 매장관리자 집단 인센티브'
  title: 'When Do Group Incentives for Retail Store Managers Work?'
  authors: 'Lee, H., Kesavan, S., and Kuhnen, C.'
  year: 2022
  venue: 'Production and Operations Management, 31(8): 3077-3095'
  citation: 'Lee, H., Kesavan, S., and Kuhnen, C. (2022) When Do Group Incentives for Retail Store Managers Work? Production and Operations Management, 31(8): 3077-3095.'
  note: 'Lead article; Best Interdisciplinary Paper Award at DSI 2018 Annual Conference, Chicago.'
  question: 'Do corporate-goal-based group incentives improve retail store-manager performance, and when do their effects vary?'
  question_ko: '기업 전체 목표에 연동된 집단 인센티브는 소매점 관리자 성과를 개선하는가, 그리고 그 효과는 언제 달라지는가?'
  finding: 'Making store manager bonuses depend on corporate goals worsened overall store performance; the effect varied with geographical proximity among stores and focal-store past performance.'
  finding_ko: '관리자 보너스를 기업 전체 목표에 연동하자 전반적인 매장 성과가 악화되었으며, 이 효과는 매장 간 지리적 근접성과 해당 매장의 과거 성과에 따라 달라졌다.'
  impact: 'The results caution that group incentives in multi-unit retail organizations can backfire unless incentive design accounts for local store conditions.'
  impact_ko: '다점포 소매 조직에서 집단 인센티브는 지역적 매장 조건을 반영하지 않으면 역효과를 낼 수 있음을 시사한다.'
  links:
    - label: Wiley
      url: 'https://onlinelibrary.wiley.com/doi/epdf/10.1111/poms.13740'
  featured: true
  featured_order: 4
  research_theme_ids:
    - 'retail-service-operations'
