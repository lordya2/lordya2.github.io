- id: 'drug-shortage-transparency'
  category: 'peer_reviewed'
  short_title: 'Alleviating Drug Shortages'
  featured_short_title: 'Drug Shortage Transparency'
  featured_short_title_ko: '의약품 부족과 운영 투명성'
  title: 'Alleviating Drug Shortages: The Role of Mandated Reporting-Induced Operational Transparency'
  authors: 'Lee, J., Lee, H., Shin, H., and Krishnan, V.'
  year: 2021
  venue: 'Management Science, 67(4): 2326-2339'
  citation: 'Lee, J., Lee, H., Shin, H., and Krishnan, V. (2021) Alleviating Drug Shortages: The Role of Mandated Reporting-Induced Operational Transparency. Management Science, 67(4): 2326-2339.'
  note: 'The first two authors contributed equally to this paper.'
  question: 'When does mandatory interruption reporting alleviate drug shortages?'
  question_ko: '생산중단 의무 보고는 어떤 시장 조건에서 의약품 부족을 완화하는가?'
  finding: 'Mandatory interruption reporting alleviates shortages, but its effectiveness depends on product-market competition: the effect is strongest under duopoly, weaker under monopoly, and declines as competition intensifies.'
  finding_ko: '생산중단 의무 보고는 의약품 부족을 완화하지만 효과는 제품시장 경쟁 정도에 따라 달라진다. 효과는 복점에서 가장 강하고 독점에서는 더 약하며, 경쟁이 심화될수록 감소한다.'
  impact: 'The findings show that operational-transparency policy can reduce shortages, while market structure shapes where the policy is most effective.'
  impact_ko: '운영 투명성 정책이 부족 사태를 줄일 수 있음을 보여주지만, 정책 효과가 크게 나타나는 영역은 시장 구조에 의해 달라진다는 점을 제시한다.'
  links:
