- id: 'fitting-room-traffic'
  category: 'peer_reviewed'
  short_title: 'Fitting-Room Traffic'
  featured_short_title_ko: '피팅룸 혼잡과 매장 운영'
  title: 'Managing the Impact of Fitting-Room Traffic on Retail Sales: Using Labor to Reduce Phantom Stockouts'
  authors: 'Lee, H., Kesavan, S., and Deshpande, V.'
  year: 2021
  venue: 'Manufacturing & Service Operations Management, 23(6): 1580-1596'
  citation: 'Lee, H., Kesavan, S., and Deshpande, V. (2021) Managing the Impact of Fitting-Room Traffic on Retail Sales: Using Labor to Reduce Phantom Stockouts. Manufacturing & Service Operations Management, 23(6): 1580-1596.'
  question: 'How does fitting-room congestion affect apparel sales, and can dedicated labor mitigate the operational loss?'
  question_ko: '피팅룸 혼잡은 의류 매출에 어떤 영향을 미치며, 전담 인력은 운영 손실을 완화할 수 있는가?'
  finding: 'Fitting-room traffic and sales have an inverted-U relationship. High traffic increases phantom stockouts, and dedicated fitting-room associates reduce phantom stockouts and increase sales by approximately 22.4%-22.7%.'
  finding_ko: '피팅룸 트래픽과 매출은 역U자 관계를 보인다. 높은 트래픽은 팬텀 품절을 증가시키며, 피팅룸 전담 직원은 팬텀 품절을 줄이고 매출을 약 22.4%-22.7% 증가시킨다.'
  impact: 'The paper quantifies how service congestion creates hidden inventory-availability problems and how targeted labor can improve sales.'
  impact_ko: '서비스 혼잡이 숨겨진 재고 가용성 문제를 만든다는 점과 표적화된 인력 배치가 매출 개선으로 이어질 수 있음을 정량화한다.'
  links:
