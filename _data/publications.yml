- id: 'drug-shortage-recovery'
  category: 'peer_reviewed'
  short_title: 'Learning in Recovery from Disruption'
  featured_short_title: 'Drug Shortage Recovery'
  featured_short_title_ko: '의약품 부족 회복과 조직 학습'
  title: 'Learning in Recovery from Disruption: Empirical Evidence from the U.S. Drug Shortages'
  authors: 'Lee, H., Lee, J., Noh, I., and Staats, B.'
  year: 2026
  venue: 'Management Science, Articles in Advance'
  citation: 'Lee, H., Lee, J., Noh, I., and Staats, B. (2026) Learning in Recovery from Disruption: Empirical Evidence from the U.S. Drug Shortages. Management Science, Published Online Articles in Advance.'
  question: 'How does prior recovery experience affect how quickly pharmaceutical plants resolve current drug shortages?'
  question_ko: '제약 생산공장의 과거 부족 사태 회복 경험은 현재 의약품 부족의 회복 속도에 어떤 영향을 미치는가?'
  finding: 'Each additional shortage previously resolved by a plant reduces recovery time for a current shortage. Learning is concentrated in internally caused shortages, benefits from broader experience, and transfers only weakly across plants within the same firm.'
  finding_ko: '생산공장이 과거에 해결한 부족 사태가 하나 늘어날수록 현재 부족 사태의 회복 시간이 감소한다. 학습 효과는 내부 원인 부족 사태에서 집중적으로 나타나며, 폭넓은 경험에서 이익을 얻고, 같은 기업 내 다른 공장으로는 약하게만 이전된다.'
  impact: 'The results identify plant-level recovery experience as a measurable source of pharmaceutical supply-chain resilience and point to limits in firm-wide knowledge transfer.'
  impact_ko: '이 결과는 공장 수준의 회복 경험이 제약 공급망 회복탄력성의 측정 가능한 원천임을 보여주며, 기업 내부 지식 이전에는 한계가 있음을 시사한다.'
  links:
    - label: INFORMS
      url: 'https://pubsonline.informs.org/doi/10.1287/mnsc.2024.08337'
  featured: true
  featured_order: 1
